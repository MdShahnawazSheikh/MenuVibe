name: Release

# Cuts a GitHub Release with a built .app + .dmg whenever you push a version tag.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# The artifacts here are ad-hoc signed (CI has no Developer ID). For a Gatekeeper-
# friendly download, sign & notarize locally (see README › Distribution) and attach
# that DMG to the release, or add DEVELOPER_ID secrets and a notarize step below.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Build, test & bundle
        run: |
          swift test
          ./Scripts/build-app.sh release
          ./Scripts/make-dmg.sh

      - name: Zip the app
        run: cd dist && zip -r -y MenuVibe.app.zip MenuVibe.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/MenuVibe.dmg
            dist/MenuVibe.app.zip
